<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini E-Commerce</title>
<link rel="stylesheet" href="./mini e-commerce.css">
<link rel="icon" href="https://png.pngtree.com/png-clipart/20190920/original/pngtree-shopping-cart-convenient-icon-png-image_4637407.jpg">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2>🛒MINI BAZAAR</h2>
    <div id="cart">Cart (<span id="cartCount">0</span>)</div>
</nav>

<!-- SEARCH + FILTER -->
<div class="controls">
    <input type="text" id="searchInput" placeholder="Search product...">

    <select id="categoryFilter" style="margin-left: 75%;">
        <option value="all">All</option>
        <option value="electronics">electronics</option>
        <option value="jewelery">jewelery</option>
        <option value="men's clothing">men's clothing</option>
        <option value="women's clothing">women's clothing</option>
    </select>
</div>

<!-- PRODUCTS -->
<div id="productContainer" class="products"></div>

<script src="./mini e-commerce.js"></script>
</body>
</html>
